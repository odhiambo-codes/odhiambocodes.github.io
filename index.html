<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Auth App</title>
<style>
 
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #bfbebe;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  .container {
    background-color:#fff;
    padding:20px 40px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:300px;
  }
  h1 {
    text-align:center;
    margin-bottom:20px;
    border-bottom:2px solid #720707;
    padding-bottom:5px;
  }
  label { display:block; margin-bottom:5px; font-size:16px; }
  input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #720707; }
  button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background-color:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
  }
  button:hover { background-color:#1c0a44; }
  p { text-align:center; margin-top:10px; }
  p a { text-decoration:none; font-weight:700; cursor:pointer; color:#720707; }
  .hidden { display:none; }
</style>
</head>
<body>

<div class="container">

  <!-- Register Page -->
  <div id="registerPage">
    <h1>Register</h1>
    <label>Username</label>
    <input type="text" id="regUsername">
    <label>Email</label>
    <input type="email" id="regEmail">
    <label>Password</label>
    <input type="password" id="regPassword">
    <label>Confirm Password</label>
    <input type="password" id="regConfirm">
    <button onclick="register()">Register</button>
    <p>Already have an account? <a onclick="showPage('login')">Login here</a></p>
  </div>

  <!-- Login Page -->
  <div id="loginPage" class="hidden">
    <h1>Login</h1>
    <label>Username</label>
    <input type="text" id="loginUsername">
    <label>Password</label>
    <input type="password" id="loginPassword">
    <button onclick="login()">Login</button>
    <p>Don't have an account? <a onclick="showPage('register')">Register here</a></p>
  </div>

  <!-- Home Page -->
  <div id="homePage" class="hidden">
    <h1>WELCOME</h1>
    <p>You are successfully logged in!</p>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
function showPage(page) {
  document.getElementById('registerPage').classList.add('hidden');
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('homePage').classList.add('hidden');
  if(page==='register') document.getElementById('registerPage').classList.remove('hidden');
  if(page==='login') document.getElementById('loginPage').classList.remove('hidden');
  if(page==='home') document.getElementById('homePage').classList.remove('hidden');
}

function register() {
  const u = document.getElementById('regUsername').value.trim();
  const e = document.getElementById('regEmail').value.trim();
  const p = document.getElementById('regPassword').value.trim();
  const c = document.getElementById('regConfirm').value.trim();

  if(!u || !e || !p || !c){ alert("Please fill all fields!"); return; }
  if(p!==c){ alert("Passwords do not match!"); return; }
  if(p.length<6){ alert("Password must be at least 6 characters!"); return; }

  localStorage.setItem('username', u);
  localStorage.setItem('email', e);
  localStorage.setItem('password', p);
  alert("Registered successfully!");
  showPage('login');
}

function login() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value.trim();

  if(u===localStorage.getItem('username') && p===localStorage.getItem('password')){
    alert("Login successful!");
    showPage('home');
  } else {
    alert("Invalid username or password.");
  }
}

function logout() {
  showPage('login');
}
</script>

</body>
</html>
